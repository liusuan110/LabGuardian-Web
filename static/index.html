<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LabGuardian 元件与引脚识别</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <header class="masthead">
          <div>
            <p class="eyebrow">LabGuardian Vision</p>
            <h1>面包板元件与引脚识别</h1>
          </div>
          <div class="status-pill" id="serverStatus">就绪</div>
        </header>

        <div class="layout">
          <section class="upload-panel">
            <label class="dropzone" id="dropzone">
              <input id="fileInput" type="file" accept="image/*" />
              <span class="upload-icon" aria-hidden="true">+</span>
              <strong>选择或拖入面包板电路图片</strong>
              <span>返回元件框、元件类别、引脚点和引脚名</span>
            </label>

            <figure class="preview-frame" id="previewFrame">
              <img id="previewImage" alt="上传图片预览" />
              <figcaption id="previewCaption">等待上传图片</figcaption>
            </figure>

            <div class="settings-row">
              <label>
                置信度
                <input id="confInput" type="number" min="0.01" max="0.99" step="0.01" value="0.25" />
              </label>
              <label>
                IOU
                <input id="iouInput" type="number" min="0.01" max="0.99" step="0.01" value="0.50" />
              </label>
              <label>
                尺寸
                <input id="imgszInput" type="number" min="320" max="1920" step="32" value="960" />
              </label>
            </div>

            <button class="primary-action" id="analyzeButton" type="button" disabled>
              开始识别元件和引脚
            </button>
          </section>

          <section class="result-panel">
            <div class="result-toolbar">
              <div>
                <p class="eyebrow">Recognition Output</p>
                <h2>元件与引脚标注图</h2>
              </div>
              <a class="download-link" id="downloadLink" href="#" target="_blank" rel="noreferrer">打开结果图</a>
            </div>

            <div class="tabs" id="tabs" aria-label="结果图片类型">
              <button type="button" data-key="components_and_pins" class="active">元件 + 引脚</button>
              <button type="button" data-key="components_only">仅元件框</button>
            </div>

            <div class="image-stage" id="imageStage">
              <div class="empty-state" id="emptyState">上传图片后，这里会显示识别到的元件框和引脚点。</div>
              <img id="resultImage" alt="元件与引脚识别结果图" />
            </div>

            <div class="metrics" id="metrics">
              <div><span>元件数</span><strong>-</strong></div>
              <div><span>引脚数</span><strong>-</strong></div>
              <div><span>图片尺寸</span><strong>-</strong></div>
            </div>

            <section class="component-list" id="componentList"></section>

            <details class="data-box">
              <summary>查看结构化识别数据</summary>
              <pre id="jsonOutput">{}</pre>
            </details>
          </section>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
